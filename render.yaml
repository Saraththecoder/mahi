services:
  # ── Backend: FastAPI ──────────────────────────────────────────────
  - type: web
    name: crop-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false          # Set this manually in the Render dashboard
      - key: DATABASE_NAME
        value: smart_agriculture
      - key: OPENWEATHER_API_KEY
        sync: false          # Set this manually in the Render dashboard
    healthCheckPath: /

  # ── Frontend: React + Vite ────────────────────────────────────────
  - type: web
    name: crop-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to your backend Render URL e.g. https://crop-ai-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
